<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">


  <title>Blog preview card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <main>
    <div class="card">
      <img class="card-img" src="./assets/images/illustration-article.svg" alt="article illustration">
      <div class="card-body">
        <div class="card-tag">Learning</div>
        <div class="card-publish-data">Published 21 Dec 2023</div>
        <h2 class="card-title" href="#">
          HTML & CSS foundations
        </h2>
        <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>

      </div>

      <div class="card-author">
        <img class="card-author-img" src="./assets/images/image-avatar.webp" alt="greg hooper profile image">
        <h3 class="card-author-name">Greg Hooper</h3>
      </div>
    </div>
  </main>
</body>

</html>
