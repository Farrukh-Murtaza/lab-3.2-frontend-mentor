<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">


  <title>Blog preview card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <main>
    <div class="card d-flex flex-column justify-content-start p-4 gap-4 ">
      <img class="card-img" src="./assets/images/illustration-article.svg" alt="article illustration">
      <div class="card-body d-flex flex-column align-items-start p-0">
        <div class="card-tag gap-2 rounded-1 fw-bold text-center py-1">Learning</div>
        <div class="card-publish-data">Published 21 Dec 2023</div>
        <h2 class="card-title fw-bold text-decoration-none m-0">
          HTML & CSS foundations
        </h2>
        <p class="card-paragraph m-0">These languages are the backbone of every website, defining structure, content,
          and presentation.
        </p>

      </div>

      <div class="card-author d-flex align-items-center">
        <img class="card-author-img" src="./assets/images/image-avatar.webp" alt="greg hooper profile image">
        <h3 class="card-author-name fw-bold">Greg Hooper</h3>
      </div>
    </div>
  </main>
</body>

</html>
