<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>QR Code component</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">

</head>

<body>

  <main>
    <div class="card">
      <img class="card-img" src="./images/image-qr-code.png" alt="qr code for front-end skills project">
      <div class="card-body">
        <h4 class="card-title">Improve your front-end skills by building projects</h4>
        <p class="card-paragraph">Scan the QR code to visit Frontend Mentor and take your coding skills to the next
          level</p>
      </div>
    </div>
  </main>

</body>

</html>
