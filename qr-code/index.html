<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>QR Code component</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./style.css">

</head>

<body>

  <main>

    <div class="card pt-3 px-3 pb-5 gap-4 align-items-center">
      <img class="card-img-top card-img" src="./images/image-qr-code.png" alt="qr code for front-end skills project">
      <div class="card-body d-flex flex-column justify-content-start gap-3 px-3 py-0">
        <h4 class="card-title fw-bold text-center mb-0 ">Improve your front-end skills by building projects</h4>
        <p class="card-paragraph text-center mb-0">
          Scan the QR code to visit Frontend Mentor and take your coding skills
          to the next level</p>
      </div>
    </div>
  </main>

</body>

</html>
